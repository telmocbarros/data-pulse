version: "3"

services:
  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: pgadmin@admin.pt
      PGADMIN_DEFAULT_PASSWORD: password
    ports:
      - 5050:80
    networks:
      - data-pulse

  database:
    container_name: DataPulseDB
    image: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: data-pulse-db
    ports:
      - 5432:5432
    volumes:
      - db:/data/postgres
    networks:
      - data-pulse
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d postgres"]
      interval: 30s
      timeout: 10s
      retries: 5

  file-storage:
    container_name: FileStorage
    command: server /data --console-address ":9001"
    image: minio/minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - 9000:9000
      - 9001:9001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - filestorage:/data
    networks:
      - data-pulse

volumes:
  db:
  filestorage:
networks:
  data-pulse:
    driver: bridge
